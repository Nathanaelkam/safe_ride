services:
  emergency-redis:
    image: redis:7-alpine
    container_name: seva-emergency-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-postgres:
    image: postgres:15-alpine
    container_name: seva-auth-db
    environment:
      POSTGRES_USER: seva
      POSTGRES_PASSWORD: seva
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"   # for local inspection, remove in production
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seva -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: seva-auth-service
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://seva:seva@auth-postgres:5432/auth_db
    ports:
      - "8001:8000"
    depends_on:
      auth-postgres:
        condition: service_healthy

  emergency-service:
    build:
      context: .
      dockerfile: Dockerfile.emergency
    container_name: seva-emergency-service
    environment:
      EMERGENCY_REDIS_URL: redis://emergency-redis:6379/0
    ports:
      - "8002:8000"
    depends_on:
      emergency-redis:
        condition: service_healthy

volumes:
  auth_pgdata:
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: seva
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: kamnathanael/seva_app:auth   # ← replace with your real image
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_DATABASE_URL
              value: "postgresql+asyncpg://seva:seva@auth-postgres:5432/auth_db"
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: seva-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: seva
spec:
  selector:
    app: auth
  ports:
    - port: 8000
      targetPort: 8000
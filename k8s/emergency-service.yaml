apiVersion: apps/v1
kind: Deployment
metadata:
  name: emergency
  namespace: seva
spec:
  replicas: 2
  selector:
    matchLabels:
      app: emergency
  template:
    metadata:
      labels:
        app: emergency
    spec:
      containers:
        - name: emergency
          image: kamnathanael/seva_app:emergency   # ← replace with your real image
          ports:
            - containerPort: 8000
          env:
            - name: EMERGENCY_REDIS_URL
              value: "redis://emergency-redis:6379/0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: emergency-service
  namespace: seva
spec:
  selector:
    app: emergency
  ports:
    - port: 8000
      targetPort: 8000
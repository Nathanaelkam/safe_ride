apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: seva
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: kamnathanael/seva_app:notification   # ← replace with your real image
          ports:
            - containerPort: 8000
          env:
            - name: NOTIFICATION_REDIS_URL
              value: "redis://emergency-redis:6379/0"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: seva
spec:
  selector:
    app: notification
  ports:
    - port: 8000
      targetPort: 8000
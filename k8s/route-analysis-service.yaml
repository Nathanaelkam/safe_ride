apiVersion: apps/v1
kind: Deployment
metadata:
  name: route-analysis
  namespace: seva
spec:
  replicas: 1
  selector:
    matchLabels:
      app: route-analysis
  template:
    metadata:
      labels:
        app: route-analysis
    spec:
      containers:
        - name: route-analysis
          image: kamnathanael/seva_app:route_analysis   # ← replace with your real image
          ports:
            - containerPort: 8000
          env:
            - name: ROUTE_ANALYSIS_REDIS_URL
              value: "redis://emergency-redis:6379/0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: route-analysis-service
  namespace: seva
spec:
  selector:
    app: route-analysis
  ports:
    - port: 8000
      targetPort: 8000